##### Prefix ########################################################
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix


##### Performance ###################################################
set -sg escape-time 1


##### Index #########################################################
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


##### Reload ########################################################
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"


##### Pane / Window Management ######################################
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# vim 風ペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim 風ウィンドウ移動（repeatable）
bind -r C-h previous-window
bind -r C-l next-window

# ペインリサイズ
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### Mouse #########################################################
set -g mouse on


##### Sync Panes ####################################################
bind o setw synchronize-panes on
bind u setw synchronize-panes off


##### Terminal / Color #############################################
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"


##### Status Bar ####################################################
set -g status-position top
set -g status-interval 5
set -g status-justify centre

set -g status-style "fg=white,bg=black"

setw -g window-status-style "fg=cyan,dim"
setw -g window-status-current-style "fg=white,bg=red,bold"

set -g pane-border-style "fg=green"
set -g pane-active-border-style "fg=yellow,bold"

set -g message-style "fg=white,bg=black,bold"

set -g status-left-length 40
set -g status-right-length 90

set -g status-left "#[fg=green]Session:#S #[fg=yellow]Index:#I #[fg=cyan]Pane:#P"
set -g status-right "#[fg=cyan]#(battery --tmux) %Y-%m-%d(%a) %H:%M"


##### Activity ######################################################
setw -g monitor-activity on
set -g visual-activity on


##### Copy Mode #####################################################
setw -g mode-keys vi

if-shell 'command -v pbcopy >/dev/null' {
  bind-key -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
} {
  bind-key -T copy-mode-vi y     send -X copy-pipe-and-cancel "xclip -selection clipboard"
  bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -selection clipboard"
}


##### Focus #########################################################
set -g focus-events on


##### Default Command ###############################################
if-shell 'command -v reattach-to-user-namespace >/dev/null' {
  set -g default-command "reattach-to-user-namespace -l ${SHELL}"
}


##### TPM ###########################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'

set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'

if-shell 'test -x /opt/homebrew/opt/tpm/share/tpm/tpm' {
  run '/opt/homebrew/opt/tpm/share/tpm/tpm'
} {
  if-shell 'test -x ~/.tmux/plugins/tpm/tpm' {
    run '~/.tmux/plugins/tpm/tpm'
  }
}
